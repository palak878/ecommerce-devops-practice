name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build cartservice image
        run: docker build -t cartservice:ci ./src/cartservice/src

      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cartservice:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      - name: Log in to GitHub Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag cartservice:ci ghcr.io/${{ github.repository_owner }}/cartservice:latest
          docker push ghcr.io/${{ github.repository_owner }}/cartservice:latest